server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # hashed assets are immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The SPA shell must revalidate, or a returning user keeps a cached index.html
    # that references hashed JS from a previous deploy (now 404) → white screen.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — Traefik routes /api elsewhere, so nginx only serves the app
    location / {
        try_files $uri $uri/ /index.html;
    }
}
