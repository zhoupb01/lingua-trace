            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is LinguaTrace?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "LinguaTrace is a minimal AI translator powered by OpenAI. You type or select any text, pick a target language, and it translates instantly, then automatically saves the result to your private log so you can look back on everything you have translated."
                }
              },
              {
                "@type": "Question",
                "name": "Is LinguaTrace free to use?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. You sign in with a free account and start translating right away."
                }
              },
              {
                "@type": "Question",
                "name": "Which languages can I translate into?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "LinguaTrace supports 10+ target languages, including English, Simplified Chinese, Japanese, Korean, French, German, Spanish, Portuguese, Italian and Russian. Source text can be in any language."
                }
              },
              {
                "@type": "Question",
                "name": "Is my data private?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. Every translation is saved only to your own account and is never shared or made public. The Chrome extension never reads pages on its own; it only handles text you type or explicitly select."
                }
              },
              {
                "@type": "Question",
                "name": "Do I need to install anything?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. LinguaTrace runs in your browser. There is also an optional Chrome extension that adds a side panel and a right-click Translate action."
                }
              },
              {
                "@type": "Question",
                "name": "How is this different from a normal translator?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Most translators forget the moment you close the tab. LinguaTrace keeps a running record of what you translate, turning everyday translation into a personal language log you can learn from."
                }
              }
            ]
          }
        ]
