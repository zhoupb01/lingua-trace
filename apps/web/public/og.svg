<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="LinguaTrace — translate anything, remember everything.">
  <!-- Clean Light background -->
  <rect width="1200" height="630" fill="#f7f9f8" />
  <rect x="0.75" y="0.75" width="1198.5" height="628.5" rx="0" fill="none" stroke="#e7eae9" stroke-width="1.5" />

  <!-- Brand lockup -->
  <g transform="translate(80,60) scale(2)">
    <rect width="32" height="32" rx="8" fill="#059669" />
    <path d="M12 8.5v10.2c0 .9.7 1.6 1.6 1.6H21" fill="none" stroke="#ffffff" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="21" cy="11" r="2.4" fill="#ffffff" />
  </g>
  <text x="164" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" font-size="38" font-weight="600" fill="#1a1a1e">LinguaTrace</text>

  <!-- Headline -->
  <text x="80" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" font-size="56" font-weight="700" fill="#1a1a1e" letter-spacing="-1">Translate anything.</text>
  <text x="80" y="372" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" font-size="56" font-weight="700" fill="#1a1a1e" letter-spacing="-1">Remember everything.</text>
  <rect x="82" y="400" width="72" height="6" rx="3" fill="#10b981" />
  <text x="80" y="454" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" font-size="26" font-weight="400" fill="#6b7280">AI translation with a memory — powered by OpenAI.</text>
  <text x="80" y="566" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" font-size="22" font-weight="500" fill="#9aa0aa">lingua-trace.zhoupb.com</text>

  <!-- Product card motif -->
  <rect x="774" y="156" width="350" height="300" rx="24" fill="#1f2937" opacity="0.05" />
  <rect x="770" y="150" width="350" height="300" rx="24" fill="#ffffff" stroke="#e7eae9" stroke-width="1.5" />
  <!-- source text lines -->
  <rect x="798" y="186" width="294" height="14" rx="7" fill="#eef1f0" />
  <rect x="798" y="210" width="210" height="14" rx="7" fill="#eef1f0" />
  <!-- target language pill -->
  <rect x="798" y="248" width="92" height="30" rx="15" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" />
  <text x="844" y="269" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif" font-size="16" font-weight="600" fill="#047857">English</text>
  <!-- translated result block -->
  <rect x="798" y="300" width="294" height="134" rx="16" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" />
  <rect x="816" y="320" width="120" height="12" rx="6" fill="#6ee7b7" />
  <rect x="816" y="350" width="262" height="12" rx="6" fill="#34d399" />
  <rect x="816" y="376" width="220" height="12" rx="6" fill="#34d399" />
  <rect x="816" y="402" width="172" height="12" rx="6" fill="#34d399" />
</svg>
